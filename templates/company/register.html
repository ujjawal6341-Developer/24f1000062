{% extends "base.html" %}

{% block content %}

<h2>Company Registration</h2>

<form method="POST">

<input class="form-control mb-3" name="company_name" placeholder="Company Name">

<input class="form-control mb-3" name="email" placeholder="Email">

<input class="form-control mb-3" name="website" placeholder="Website">

<input class="form-control mb-3" name="password" placeholder="Password">

<button class="btn btn-warning">Register</button>

</form>

{% endblock %}
