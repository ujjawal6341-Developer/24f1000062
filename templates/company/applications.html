{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Student Applications</h2>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Student</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            {% for app in applications %}

            <tr>
                <td>{{ app.student.name }}</td>
                <td>{{ app.status }}</td>

                <td>

                    <a href="/company/shortlist/{{ app.id }}" 
                       class="btn btn-success btn-sm">
                        Shortlist
                    </a>

                    <a href="/company/reject/{{ app.id }}" 
                       class="btn btn-danger btn-sm">
                        Reject
                    </a>

                </td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
