{% extends "base.html" %}

{% block content %}

<h2>Available Jobs</h2>

{% for drive in drives %}

<div class="card">

<h3>{{ drive.job_title }}</h3>

<p>{{ drive.job_description }}</p>

<p><b>Eligibility:</b> {{ drive.eligibility }}</p>

<a href="/login" class="btn">Apply</a>

</div>

{% endfor %}

{% endblock %}
