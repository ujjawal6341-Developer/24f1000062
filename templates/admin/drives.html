{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2 class="mb-4">All Placement Drives</h2>

<table class="table table-bordered table-striped">

<thead>
<tr>
<th>Company</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for drive in drives %}

<tr>
<td>{{ drive.company_name }}</td>
<td>{{ drive.role }}</td>
<td>{{ drive.status }}</td>

<td>
<a href="/admin/drive/approve/{{ drive.id }}" class="btn btn-success btn-sm">
Approve
</a>

<a href="/admin/drive/reject/{{ drive.id }}" class="btn btn-danger btn-sm">
Reject
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
