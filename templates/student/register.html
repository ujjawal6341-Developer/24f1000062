{% extends "base.html" %}

{% block content %}

<h2>Student Registration</h2>

<form action="/student/register" method="POST" enctype="multipart/form-data">

  <input class="form-control mb-3" type="text" name="name" placeholder="Full Name" required>

  <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>

  <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

  <input class="form-control mb-3" type="text" name="course" placeholder="Course" required>

  <label class="mb-2">Upload Resume</label>
  <input class="form-control mb-3" type="file" name="resume" required>

  <button class="btn btn-success" type="submit">Register</button>

</form>

{% endblock %}
