{% extends "base.html" %}

{% block content %}

<h2>Student Registration</h2>

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="Full Name">

<input class="form-control mb-3" name="email" placeholder="Email">

<input class="form-control mb-3" name="password" placeholder="Password">

<input class="form-control mb-3" name="course" placeholder="Course">

<button class="btn btn-success">Register</button>

</form>

{% endblock %}
